<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kutaisi Jobs Feed</title>
    <style>
        :root { 
            --bg: #001f3f; 
            --card: #002d5b; 
            --yellow: #FFD700; 
            --text: #ffffff; 
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0; 
            line-height: 1.4;
        }
        
        header { 
            padding: 60px 20px; 
            text-align: center; 
            border-bottom: 6px solid var(--yellow);
            background: linear-gradient(180deg, #002d5b 0%, #001f3f 100%);
        }

        h1 { 
            font-size: 3rem; 
            color: var(--yellow); 
            text-transform: uppercase; 
            margin: 0; 
            letter-spacing: -1px;
        }

        .feed { 
            max-width: 750px; 
            margin: 40px auto; 
            padding: 0 20px; 
        }
        
        .vacancy-card { 
            background: var(--card); 
            padding: 25px; 
            margin-bottom: 30px; 
            border-radius: 12px; 
            border: 1px solid rgba(255, 215, 0, 0.1);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        /* HEADER SECTION: Logo + Titles */
        .card-top {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .logo-frame {
            width: 110px;
            height: 110px;
            min-width: 110px;
            background: #001a35;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid var(--yellow);
        }

        .logo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .title-group {
            display: flex;
            flex-direction: column;
        }

        .company-label {
            font-size: 0.9rem;
            color: var(--yellow);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .vacancy-name {
            font-size: 2.2rem;
            font-weight: 900; /* EXTRA BOLD */
            margin: 0;
            line-height: 1.1;
        }

        .tag {
            background: rgba(255, 215, 0, 0.1);
            color: var(--yellow);
            padding: 4px 10px;
            font-size: 0.75rem;
            font-weight: bold;
            border: 1px solid var(--yellow);
            border-radius: 4px;
            display: inline-block;
            margin-top: 10px;
        }

        .description {
            color: #bdc3c7;
            margin: 20px 0;
            font-size: 1.1rem;
        }

        .phone-display {
            font-weight: bold;
            color: var(--yellow);
            margin-bottom: 15px;
            display: block;
            font-size: 1.1rem;
        }

        .call-btn {
            display: block;
            background: var(--yellow);
            color: var(--bg);
            text-align: center;
            padding: 18px;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.2rem;
            border-radius: 8px;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .call-btn:active {
            transform: scale(0.97);
        }

        #loader { text-align: center; padding: 100px; font-size: 1.2rem; opacity: 0.5; }
        
        @media (max-width: 500px) {
            .card-top { flex-direction: column; align-items: flex-start; }
            .vacancy-name { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>CITY JOBS</h1>
    </header>

    <div id="loader">იტვირთება...</div>
    <div class="feed" id="vacancy-feed"></div>

    <script>
        // PASTE YOUR GOOGLE SHEET CSV LINK HERE
        const sheetCsvUrl = 'YOUR_CSV_URL_HERE';

        async function loadData() {
            try {
                const response = await fetch(sheetCsvUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                const feed = document.getElementById('vacancy-feed');
                document.getElementById('loader').style.display = 'none';

                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 6) {
                        const [logo, company, title, desc, tag, phone] = cols.map(c => c.replace(/^"|"$/g, '').trim());
                        
                        const card = document.createElement('div');
                        card.className = 'vacancy-card';
                        card.innerHTML = `
                            <div class="card-top">
                                <div class="logo-frame">
                                    <img src="${logo || 'https://via.placeholder.com/500?text=LOGO'}" onerror="this.src='https://via.placeholder.com/500?text=LOGO'">
                                </div>
                                <div class="title-group">
                                    <span class="company-label">${company}</span>
                                    <h2 class="vacancy-name">${title}</h2>
                                    <div><span class="tag">${tag}</span></div>
                                </div>
                            </div>
                            <p class="description">${desc}</p>
                            <span class="phone-display">📞 ${phone}</span>
                            <a href="tel:${phone}" class="call-btn">დარეკვა და განაცხადი</a>
                        `;
                        feed.appendChild(card);
                    }
                });
            } catch (err) {
                document.getElementById('loader').innerText = "ჩატვირთვის შეცდომა.";
            }
        }
        loadData();
    </script>
</body>
</html>
