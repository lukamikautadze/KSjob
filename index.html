<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>საზაფხულო ვაკანსიები ქუთაისში</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --bg: #001f3f; 
            --card: #002d5b; 
            --yellow: #FFD700; 
            --text: #ffffff; 
            --green: #2ecc71; 
            --red: #ff4d4d;
            --blue: #3b82f6;
            --purple: #8b5cf6;
            --main-font: 'Noto Sans Georgian', sans-serif;
        }
        
        * { box-sizing: border-box; }

        body, html, h1, h2, p, span, div, a { 
            font-family: var(--main-font) !important; 
        }

        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 0; }

        .hero {
            min-height: 55vh;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 120px 20px 60px;
            background: linear-gradient(rgba(0, 31, 63, 0.55), rgba(0, 31, 63, 0.75)), 
                        url('https://github.com/lukamikautadze/KSjob/raw/main/white-bridge-gnta.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .hero-logo {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 240px !important;
            height: auto !important;
            z-index: 10;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.4));
        }

        .hero h1 { 
            font-family: var(--main-font) !important;
            font-size: clamp(1.6rem, 4vw, 2.6rem); 
            color: var(--yellow); 
            margin: 0 0 16px 0; 
            font-weight: 900; 
            text-shadow: 0 4px 16px rgba(0,0,0,0.9);
            line-height: 1.3; 
            letter-spacing: 0.5px;
            max-width: 650px;
        }

        .hero p {
            font-size: 1rem;
            max-width: 520px;
            margin: 0;
            line-height: 1.6;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
            font-weight: 400;
        }

        @media (max-width: 600px) {
            .hero-logo { width: 64px !important; top: 14px; }
            .hero { padding: 100px 16px 50px; background-attachment: scroll; }
            .hero h1 { font-size: 1.5rem; }
            .hero p { font-size: 0.9rem; }
        }

        .scroll-indicator {
            position: absolute;
            bottom: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--yellow);
            animation: bounce 2s infinite;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.8;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0) translateX(-50%);}
            40% {transform: translateY(-8px) translateX(-50%);}
            60% {transform: translateY(-4px) translateX(-50%);}
        }

        .feed { max-width: 750px; margin: 50px auto; padding: 0 20px; }

        .vacancy-card { 
            background: var(--card); 
            padding: 25px; 
            margin-bottom: 25px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,215,0,0.1); 
            position: relative;
            transition: border-color 0.2s;
        }
        .vacancy-card:hover { border-color: rgba(255,215,0,0.25); }
        
        .expired .logo-box, .expired .company-name, .expired .vacancy-title, .expired .description { 
            opacity: 0.4; 
            filter: grayscale(1); 
        }

        .card-header { display: flex; align-items: center; gap: 20px; margin-bottom: 15px; }
        .logo-box { 
            width: 100px; height: 100px; min-width: 100px; 
            background: #001a35; border-radius: 8px; overflow: hidden; 
            border: 2px solid var(--yellow); 
            display: flex; align-items: center; justify-content: center; 
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .info-wrapper { display: flex; justify-content: space-between; align-items: flex-start; flex-grow: 1; }
        .company-name { font-size: 0.85rem; color: var(--yellow); text-transform: uppercase; font-weight: bold; }
        
        .status-badge { 
            display: flex; align-items: center; gap: 6px; 
            padding: 4px 10px; border-radius: 20px; 
            font-size: 0.75rem; font-weight: bold; text-transform: uppercase; 
            white-space: nowrap;
        }
        .status-badge.active { background: rgba(46, 204, 113, 0.15); border: 1px solid var(--green); color: var(--green); }
        .status-badge.expired-badge { background: rgba(255, 77, 77, 0.2); border: 2px solid var(--red); color: var(--red); opacity: 1 !important; filter: none !important; }
        
        .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .dot.green { background-color: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1.5s infinite; }
        .dot.red { background-color: var(--red); box-shadow: 0 0 8px var(--red); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .vacancy-title { font-size: 1.6rem; font-weight: 700; margin: 6px 0 0 0; line-height: 1.2; }
        .description { color: #d1d1d1; margin: 16px 0 0 0; font-size: 1rem; line-height: 1.6; white-space: pre-line; }
        
        /* ── ACTION ROW ── */
        .action-row { display: flex; gap: 10px; align-items: stretch; margin-top: 20px; }

        .call-btn { 
            flex-grow: 1; text-align: center; padding: 16px; text-decoration: none; 
            font-weight: 700; border-radius: 8px; text-transform: uppercase; font-size: 1rem; 
            display: flex; align-items: center; justify-content: center; gap: 8px;
            border: none; cursor: pointer; transition: opacity 0.2s;
        }
        .call-btn:hover { opacity: 0.9; }

        /* phone */
        .call-btn.type-phone { background: var(--yellow); color: var(--bg); }
        /* form */
        .call-btn.type-form  { background: var(--blue); color: #fff; }
        /* email */
        .call-btn.type-email { background: var(--purple); color: #fff; }
        /* expired */
        .call-btn.expired-btn { background: var(--red); color: white; cursor: default; opacity: 1 !important; filter: none !important; }
        .call-btn.expired-btn:hover { opacity: 1; }
        
        .share-btn-wrap { 
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,215,0,0.3); 
            padding: 0 18px; border-radius: 8px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; 
            opacity: 1 !important; filter: none !important;
            transition: background 0.2s;
        }
        .share-btn-wrap:hover { background: rgba(255,215,0,0.08); }

        .logo-stack { position: relative; width: 45px; height: 24px; pointer-events: none; }
        .mini-logo { width: 22px; height: 22px; position: absolute; background: transparent; }
        .l1 { left: 0; z-index: 3; } .l2 { left: 12px; z-index: 2; } .l3 { left: 24px; z-index: 1; }

        #loader { text-align: center; padding: 60px; font-size: 1.2rem; color: var(--yellow); opacity: 0.8; }

        .empty-state { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.4); font-size: 1rem; }

        footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid rgba(255,215,0,0.08);
            color: rgba(255,255,255,0.3);
            font-size: 0.85rem;
            line-height: 1.8;
        }
        footer a { color: rgba(255,215,0,0.5); text-decoration: none; }
        footer a:hover { color: var(--yellow); }
    </style>
</head>
<body>

    <section class="hero">
        <img src="https://github.com/lukamikautadze/KSjob/raw/main/Asset%203%404x.png" alt="Council Logo" class="hero-logo">
        <h1>საზაფხულო ვაკანსიები ქუთაისში</h1>
        <p>იპოვე შენი მომავალი სამსახური დღესვე.</p>
        <div class="scroll-indicator">ვაკანსიებისთვის ↓</div>
    </section>

    <div id="loader">იტვირთება ვაკანსიები...</div>
    <div class="feed" id="vacancy-feed"></div>

    <footer>
        ქუთაისის მერის ახალგაზრდული საბჭო &nbsp;·&nbsp; <a href="matplotlib.html">Admin</a>
    </footer>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8h_VRg9Qzv6U7qB3E4WDM0RXakzamSRIBCOqZT3qtFH-UE0p8QTUrkuGioYOar_KNlIx3dzOXebk8/pub?gid=0&single=true&output=csv';

        function handleShare(title, company) {
            const cleanTitle = title.replace(/['"]+/g, '').trim();
            const cleanCompany = company.replace(/['"]+/g, '').trim();
            const shareUrl = window.location.origin + window.location.pathname;
            if (navigator.share) {
                navigator.share({ 
                    title: 'ვაკანსია', 
                    text: `${cleanCompany}-ში ეძებენ: ${cleanTitle}. ნახე აქ:`, 
                    url: shareUrl 
                }).catch(()=>{});
            } else {
                const fallbackText = `${cleanCompany}-ში ეძებენ: ${cleanTitle}. ნახე აქ: ${shareUrl}`;
                navigator.clipboard.writeText(fallbackText);
                alert('ბმული კოპირებულია');
            }
        }

        function parseCSV(text) {
            const result = [];
            let row = [];
            let field = '';
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') {
                    if (inQuotes && text[i + 1] === '"') { field += '"'; i++; }
                    else { inQuotes = !inQuotes; }
                } else if (char === ',' && !inQuotes) {
                    row.push(field); field = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && text[i + 1] === '\n') i++;
                    row.push(field); result.push(row); row = []; field = '';
                } else {
                    field += char;
                }
            }
            if (row.length > 0 || field !== '') { row.push(field); result.push(row); }
            return result;
        }

        // Build the action button HTML based on contact type
        function buildActionBtn(isActive, contactType, contactValue, escapedTitle, escapedCompany) {
            if (!isActive) {
                return `<a href="javascript:void(0)" class="call-btn expired-btn">ვაკანსია შევსებულია</a>`;
            }

            if (contactType === 'form') {
                const safeUrl = contactValue.replace(/"/g, '&quot;');
                return `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer" class="call-btn type-form">📋 განაცხადის ფორმის შევსება</a>`;
            }

            if (contactType === 'email') {
                const subject = encodeURIComponent('CV — ' + escapedTitle.replace(/\\'/g, "'"));
                return `<a href="mailto:${contactValue}?subject=${subject}" class="call-btn type-email">📧 CV გაგზავნა: ${contactValue}</a>`;
            }

            // default: phone
            return `<a href="tel:${contactValue}" class="call-btn type-phone">📞 დარეკვა: ${contactValue}</a>`;
        }

        async function loadJobs() {
            try {
                const res = await fetch(csvUrl + '&t=' + Date.now(), { cache: 'no-store' });
                const data = await res.text();
                
                const rows = parseCSV(data);
                const feed = document.getElementById('vacancy-feed');
                document.getElementById('loader').style.display = 'none';

                let count = 0;
                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i];
                    if (cols.length < 6) continue;

                    let logo, company, title, desc, contact_type, contact_value, status;

                    // Support both old (6-col: logo,company,title,desc,phone,status)
                    // and new (7-col: logo,company,title,desc,contact_type,contact_value,status)
                    if (cols.length >= 7) {
                        [logo, company, title, desc, contact_type, contact_value, status] = cols.map(c => c ? c.trim() : '');
                    } else {
                        [logo, company, title, desc, contact_value, status] = cols.map(c => c ? c.trim() : '');
                        contact_type = 'phone';
                    }

                    if (!company || !title) continue;
                    if (logo && logo.includes("github.com/")) logo = logo.replace("/blob/", "/raw/");

                    const isActive = status && status.trim().toLowerCase() === 'active';
                    const card = document.createElement('div');
                    card.className = `vacancy-card ${!isActive ? 'expired' : ''}`;

                    const badgeHTML = isActive
                        ? '<div class="status-badge active"><div class="dot green"></div>Active</div>'
                        : '<div class="status-badge expired-badge"><div class="dot red"></div>Expired</div>';

                    const escapedTitle   = title.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    const escapedCompany = company.replace(/'/g, "\\'").replace(/"/g, '&quot;');

                    const actionBtnHTML = buildActionBtn(isActive, contact_type, contact_value, escapedTitle, escapedCompany);

                    card.innerHTML = `
                        <div class="card-header">
                            <div class="logo-box">
                                <img src="${logo}" onerror="this.style.display='none'">
                            </div>
                            <div style="flex-grow:1;min-width:0;">
                                <div class="info-wrapper">
                                    <span class="company-name">${company}</span>
                                    ${badgeHTML}
                                </div>
                                <h2 class="vacancy-title">${title}</h2>
                            </div>
                        </div>
                        <p class="description">${desc}</p>
                        <div class="action-row">
                            ${actionBtnHTML}
                            <div class="share-btn-wrap" onclick="handleShare('${escapedTitle}', '${escapedCompany}')">
                                <div class="logo-stack">
                                    <img class="mini-logo l1" src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
                                    <img class="mini-logo l2" src="https://cdn-icons-png.flaticon.com/512/5968/5968771.png">
                                    <img class="mini-logo l3" src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
                                </div>
                            </div>
                        </div>
                    `;
                    feed.appendChild(card);
                    count++;
                }

                if (count === 0) {
                    feed.innerHTML = '<div class="empty-state">ამჟამად ვაკანსიები არ არის.</div>';
                }

            } catch (e) {
                console.error(e);
                document.getElementById('loader').innerText = "შეცდომა მონაცემების ჩატვირთვისას.";
            }
        }

        loadJobs();
    </script>
</body>
</html>
