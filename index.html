<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kutaisi Youth Vacancies</title>
    <style>
        :root { --bg: #001f3f; --card: #002d5b; --yellow: #FFD700; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; }
        header { padding: 80px 20px; text-align: center; border-bottom: 6px solid var(--yellow); }
        h1 { font-size: 3.5rem; color: var(--yellow); text-transform: uppercase; margin: 0; }
        .feed { max-width: 700px; margin: 50px auto; padding: 0 20px; }
        .vacancy-card { background: var(--card); padding: 30px; margin-bottom: 30px; border-radius: 4px; border-left: 0px solid var(--yellow); transition: 0.3s; }
        .vacancy-card:hover { border-left: 10px solid var(--yellow); transform: translateX(10px); }
        .tag { background: var(--yellow); color: var(--bg); padding: 4px 10px; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; display: inline-block; margin-bottom: 10px; }
        .call-btn { display: block; background: var(--yellow); color: var(--bg); text-align: center; padding: 18px; text-decoration: none; font-weight: 900; margin-top: 20px; }
        #loading { text-align: center; padding: 50px; font-style: italic; opacity: 0.5; }
    </style>
</head>
<body>

    <header>
        <h1>YOUTH COUNCIL<br>VACANCIES</h1>
        <p>Live updates from the Council Admin Sheet.</p>
    </header>

    <div id="loading">Loading current vacancies...</div>
    <div class="feed" id="vacancy-feed"></div>

    <script>
        // PASTE YOUR PUBLISHED CSV LINK BELOW
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8h_VRg9Qzv6U7qB3E4WDM0RXakzamSRIBCOqZT3qtFH-UE0p8QTUrkuGioYOar_KNlIx3dzOXebk8/pub?gid=0&single=true&output=csv';

        async function loadVacancies() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1); // Skip the header row
                const feed = document.getElementById('vacancy-feed');
                const loader = document.getElementById('loading');
                
                loader.style.display = 'none';

                rows.forEach(row => {
                    const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); // Clever split for commas in text
                    if (columns.length >= 4) {
                        const [title, desc, tag, phone] = columns.map(c => c.replace(/^"|"$/g, ''));
                        
                        const card = document.createElement('div');
                        card.className = 'vacancy-card';
                        card.innerHTML = `
                            <span class="tag">${tag}</span>
                            <h3>${title}</h3>
                            <p>${desc}</p>
                            <a href="tel:${phone.trim()}" class="call-btn">Tap to Call & Apply</a>
                        `;
                        feed.appendChild(card);
                    }
                });
            } catch (error) {
                console.error('Error loading sheet:', error);
                document.getElementById('loading').innerText = 'Failed to load vacancies.';
            }
        }

        loadVacancies();
    </script>
</body>
</html>
