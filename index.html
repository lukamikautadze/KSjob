<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kutaisi Jobs</title>
    <style>
        :root { --bg: #001f3f; --card: #002d5b; --yellow: #FFD700; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; }
        header { padding: 40px 20px; text-align: center; border-bottom: 5px solid var(--yellow); }
        h1 { font-size: 2.5rem; color: var(--yellow); margin: 0; }
        .feed { max-width: 750px; margin: 30px auto; padding: 0 20px; }
        .vacancy-card { background: var(--card); padding: 25px; margin-bottom: 25px; border-radius: 10px; border: 1px solid rgba(255,215,0,0.1); }
        .card-header { display: flex; align-items: center; gap: 20px; margin-bottom: 15px; }
        .logo-box { width: 100px; height: 100px; min-width: 100px; background: #001a35; border-radius: 8px; overflow: hidden; border: 1px solid var(--yellow); }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .company-name { font-size: 0.9rem; color: var(--yellow); text-transform: uppercase; display: block; }
        .vacancy-title { font-size: 2rem; font-weight: 900; margin: 5px 0; line-height: 1.1; }
        .tag { background: rgba(255,215,0,0.1); color: var(--yellow); padding: 3px 8px; font-size: 0.7rem; border: 1px solid var(--yellow); border-radius: 4px; display: inline-block; }
        .description { color: #ccc; margin: 15px 0; line-height: 1.4; }
        .call-btn { display: block; background: var(--yellow); color: var(--bg); text-align: center; padding: 15px; text-decoration: none; font-weight: 900; border-radius: 6px; text-transform: uppercase; }
        #loader { text-align: center; padding: 50px; }
    </style>
</head>
<body>
    <header><h1>CITY JOBS</h1></header>
    <div id="loader">Loading...</div>
    <div class="feed" id="vacancy-feed"></div>

    <script>
        // CRITICAL: Ensure this is the .csv link from "Publish to Web"
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8h_VRg9Qzv6U7qB3E4WDM0RXakzamSRIBCOqZT3qtFH-UE0p8QTUrkuGioYOar_KNlIx3dzOXebk8/pub?gid=0&single=true&output=csv'; 

        async function loadJobs() {
            try {
                const res = await fetch(csvUrl);
                if (!res.ok) throw new Error('Network error');
                const data = await res.text();
                const rows = data.split(/\r?\n/).slice(1);
                const feed = document.getElementById('vacancy-feed');
                document.getElementById('loader').style.display = 'none';

                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 4) {
                        const [logo, company, title, desc, tag, phone] = cols.map(c => c.replace(/^"|"$/g, '').trim());
                        const card = document.createElement('div');
                        card.className = 'vacancy-card';
                        card.innerHTML = `
                            <div class="card-header">
                                <div class="logo-box">
                                    <img src="${logo || ''}" onerror="this.src='https://via.placeholder.com/500?text=LOGO'">
                                </div>
                                <div>
                                    <span class="company-name">${company || ''}</span>
                                    <h2 class="vacancy-title">${title || 'No Title'}</h2>
                                    <span class="tag">${tag || 'General'}</span>
                                </div>
                            </div>
                            <p class="description">${desc || ''}</p>
                            <a href="tel:${phone}" class="call-btn">CALL: ${phone || 'No Number'}</a>
                        `;
                        feed.appendChild(card);
                    }
                });
            } catch (e) {
                document.getElementById('loader').innerHTML = "Error loading data. Check CSV link.";
            }
        }
        loadJobs();
    </script>
</body>
</html>
