<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>საზაფხულო ვაკანსიები ქუთაისში</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --bg: #001f3f; 
            --card: #002d5b; 
            --yellow: #FFD700; 
            --text: #ffffff; 
            --green: #2ecc71; 
            --red: #ff4d4d; 
            --main-font: 'Noto Sans Georgian', sans-serif;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html, h1, h2, p, span, div, a { 
            font-family: var(--main-font) !important; 
        }

        body { background-color: var(--bg); color: var(--text); padding-bottom: 60px; }

        .hero {
            min-height: 55vh;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 120px 20px 60px;
            background: linear-gradient(rgba(0, 31, 63, 0.55), rgba(0, 31, 63, 0.75)), 
                        url('https://github.com/lukamikautadze/KSjob/raw/main/white-bridge-gnta.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .hero-logo {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 240px !important;
            height: auto !important;
            z-index: 10;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.4));
        }

        .hero h1 { 
            font-family: var(--main-font) !important;
            font-size: clamp(1.6rem, 4vw, 2.6rem); 
            color: var(--yellow); 
            margin: 0 0 16px 0; 
            font-weight: 900; 
        }

        /* ვაკანსიების კონტეინერი */
        .container {
            max-width: 820px;
            margin: 40px auto 0;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* შენი ორიგინალი დიზაინის ბარათები */
        .preview-card { 
            background: var(--card); 
            border: 1px solid rgba(255,215,0,0.1); 
            border-radius: 12px; 
            padding: 25px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .preview-card-header { display: flex; align-items: center; gap: 20px; margin-bottom: 15px; }
        .preview-logo-box { 
            width: 70px; height: 70px; min-width: 70px; 
            background: #001a35; border-radius: 8px; 
            border: 2px solid var(--yellow); display: flex; 
            align-items: center; justify-content: center; 
            overflow: hidden; 
        }
        .preview-logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .preview-company { font-size: 0.8rem; color: var(--yellow); text-transform: uppercase; font-weight: bold; }
        .preview-title { font-size: 1.4rem; font-weight: 700; margin-top: 4px; line-height: 1.2; color: #fff; }
        .preview-desc { color: #d1d1d1; font-size: 0.9rem; line-height: 1.5; margin-top: 12px; white-space: pre-line; }
        
        .preview-phone { 
            display: block; margin-top: 16px; background: var(--yellow); 
            color: #001f3f; padding: 12px; border-radius: 8px; 
            font-weight: 700; text-align: center; font-size: 0.95rem; 
            text-decoration: none; transition: background 0.2s;
        }
        .preview-phone:hover { background: #e6c200; }

        .loading, .no-jobs {
            text-align: center;
            padding: 40px;
            font-size: 1.1rem;
            color: var(--yellow);
        }
    </style>
</head>
<body>

    <div class="hero">
        <img class="hero-logo" src="https://github.com/lukamikautadze/KSjob/raw/main/ksjob-yellow.png" alt="KSjob Logo">
        <h1>საზაფხულო ვაკანსიები ქუთაისში</h1>
    </div>

    <div class="container" id="jobs-container">
        <div class="loading">იტვირთება ვაკანსიები...</div>
    </div>

    <script>
        // შენი ბაზის ლინკი კეშის გვერდის ავლით
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8h_VRg9Qzv6U7qB3E4WDM0RXakzamSRIBCOqZT3qtFH-UE0p8QTUrkuGioYOar_KNlIx3dzOXebk8/pub?gid=0&single=true&output=csv';

        async function fetchJobs() {
            const container = document.getElementById('jobs-container');
            
            try {
                // წამოვიღოთ მონაცემები (Date.now() უზრუნველყოფს, რომ ყოველთვის ახალი ვაკანსია გამოჩნდეს მომენტალურად)
                const res = await fetch(CSV_URL + '&t=' + Date.now(), { cache: 'no-store' });
                const text = await res.text();
                
                // დავყოთ ხაზებად
                const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
                
                if (lines.length <= 1) {
                    container.innerHTML = '<div class="no-jobs">ამჟამად აქტიური ვაკანსიები არ არის.</div>';
                    return;
                }

                container.innerHTML = '';
                let hasActiveJobs = false;

                // დავატრიალოთ ციკლი (i = 1 გამოტოვებს ჰედერს)
                for (let i = 1; i < lines.length; i++) {
                    // დავყოთ მძიმეებით, გავითვალისწინოთ ბრჭყალები ტექსტში
                    const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 6) continue;

                    let [logo, company, title, desc, phone, status] = cols.map(c => c ? c.replace(/^"|"$/g, '').trim() : '');
                    
                    // თუ ვაკანსია არ არის აქტიური, არ გამოვაჩინოთ მთავარზე
                    if (status.toLowerCase() !== 'active') continue;
                    hasActiveJobs = true;

                    // შევქმნათ შენი სტილის ბარათი
                    const card = document.createElement('div');
                    card.className = 'preview-card';
                    
                    card.innerHTML = `
                        <div class="preview-card-header">
                            <div class="preview-logo-box">
                                ${logo ? `<img src="${logo}" alt="${company}">` : '<span style="color:#888; font-size:12px;">LOGO</span>'}
                            </div>
                            <div>
                                <div class="preview-company">${company}</div>
                                <div class="preview-title">${title}</div>
                            </div>
                        </div>
                        <div class="preview-desc">${desc}</div>
                        <a href="tel:${phone}" class="preview-phone">დარეკვა: ${phone}</a>
                    `;
                    
                    container.appendChild(card);
                }

                if (!hasActiveJobs) {
                    container.innerHTML = '<div class="no-jobs">ამჟამად აქტიური ვაკანსიები არ არის.</div>';
                }

            } catch (error) {
                console.error(error);
                container.innerHTML = '<div class="no-jobs" style="color:var(--red)">შეცდომა მონაცემების ჩატვირთვისას.</div>';
            }
        }

        // ჩავრთოთ ფუნქცია საიტის ჩატვირთვისთანავე
        window.addEventListener('DOMContentLoaded', fetchJobs);
    </script>
</body>
</html>
