<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kutaisi Vacancies</title>
    <style>
        :root { --bg: #001f3f; --card: #002d5b; --yellow: #FFD700; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; }
        
        header { padding: 60px 20px; text-align: center; border-bottom: 6px solid var(--yellow); }
        h1 { font-size: 3rem; color: var(--yellow); text-transform: uppercase; margin: 0; }

        .feed { max-width: 700px; margin: 40px auto; padding: 0 20px; }
        
        .vacancy-card { 
            background: var(--card); 
            padding: 25px; 
            margin-bottom: 30px; 
            border-radius: 8px; 
            transition: 0.3s;
            border: 1px solid rgba(255,215,0,0.1);
        }

        /* LOGO & COMPANY HEADER */
        .company-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .logo {
            width: 80px; /* Displayed size (keeps it sharp) */
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            background: var(--bg);
        }

        .company-info {
            display: flex;
            flex-direction: column;
        }

        .company-name {
            font-size: 0.9rem;
            color: var(--yellow);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .vacancy-title {
            font-size: 1.8rem;
            font-weight: 800; /* Extra Bold */
            margin: 0;
            line-height: 1.1;
        }

        .tag { 
            background: rgba(255, 215, 0, 0.2); 
            color: var(--yellow); 
            padding: 4px 8px; 
            font-size: 0.7rem; 
            font-weight: bold; 
            text-transform: uppercase; 
            display: inline-block;
            margin-top: 10px;
            border: 1px solid var(--yellow);
        }

        .desc { color: #bdc3c7; margin: 20px 0; font-size: 1.05rem; }

        .call-btn { 
            display: block; 
            background: var(--yellow); 
            color: var(--bg); 
            text-align: center; 
            padding: 15px; 
            text-decoration: none; 
            font-weight: 900; 
            text-transform: uppercase;
        }

        #loading { text-align: center; padding: 50px; opacity: 0.5; }
    </style>
</head>
<body>

    <header>
        <h1>CITY JOBS</h1>
    </header>

    <div id="loading">Updating live feed...</div>
    <div class="feed" id="vacancy-feed"></div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8h_VRg9Qzv6U7qB3E4WDM0RXakzamSRIBCOqZT3qtFH-UE0p8QTUrkuGioYOar_KNlIx3dzOXebk8/pub?gid=0&single=true&output=csv'; // <--- PASTE LINK HERE

        async function loadVacancies() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1); 
                const feed = document.getElementById('vacancy-feed');
                document.getElementById('loading').style.display = 'none';

                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 6) {
                        const [logo, company, title, desc, tag, phone] = cols.map(c => c.replace(/^"|"$/g, '').trim());
                        
                        const card = document.createElement('div');
                        card.className = 'vacancy-card';
                        card.innerHTML = `
                            <div class="company-header">
                                <img src="${logo || 'https://via.placeholder.com/500'}" class="logo" alt="logo">
                                <div class="company-info">
                                    <span class="company-name">${company}</span>
                                    <h2 class="vacancy-title">${title}</h2>
                                    <div><span class="tag">${tag}</span></div>
                                </div>
                            </div>
                            <p class="desc">${desc}</p>
                            <a href="tel:${phone}" class="call-btn">Call to Apply</a>
                        `;
                        feed.appendChild(card);
                    }
                });
            } catch (e) {
                document.getElementById('loading').innerText = 'Connection error.';
            }
        }
        loadVacancies();
    </script>
</body>
</html>
