<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>საზაფხულო ვაკანსიები ქუთაისში</title>
    <style>
        :root { --bg: #001f3f; --card: #002d5b; --yellow: #FFD700; --text: #ffffff; --green: #2ecc71; --red: #ff4d4d; }
        
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; }

        /* --- HERO HEADER --- */
        .hero {
            height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(0, 31, 63, 0.6), rgba(0, 31, 63, 0.6)), 
                        url('https://github.com/lukamikautadze/KSjob/raw/main/white-bridge-gnta.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* LOGO POSITIONING */
        .hero-logo {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 120px; /* Adjust width as needed for the Council logo */
            height: auto;
            z-index: 10;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
        }

        .hero h1 { 
            font-size: clamp(2.5rem, 8vw, 4.5rem); 
            color: var(--yellow); 
            margin: 0; 
            font-weight: 900;
            text-shadow: 0 5px 15px rgba(0,0,0,0.8);
            line-height: 1.2; 
            padding: 0 15px;
        }

        .hero p {
            font-size: 1.1rem;
            max-width: 600px;
            margin-top: 30px; 
            padding: 0 20px;
            line-height: 1.6;
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
            font-weight: 500;
        }

        @media (max-width: 600px) {
            .hero-logo { width: 80px; top: 15px; right: 15px; }
            .hero h1 { font-size: 2.2rem; line-height: 1.3; letter-spacing: 1px; }
            .hero p { font-size: 1.1rem; margin-top: 20px; }
            .hero { background-attachment: scroll; }
        }

        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--yellow);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        /* --- VACANCY FEED --- */
        .feed { max-width: 750px; margin: 50px auto; padding: 0 20px; }
        .vacancy-card { background: var(--card); padding: 25px; margin-bottom: 25px; border-radius: 12px; border: 1px solid rgba(255,215,0,0.1); position: relative; }
        
        .expired .logo-box, .expired .company-name, .expired .vacancy-title, .expired .description { 
            opacity: 0.4; 
            filter: grayscale(1); 
        }

        .card-header { display: flex; align-items: center; gap: 20px; margin-bottom: 15px; }
        .logo-box { width: 100px; height: 100px; min-width: 100px; background: #001a35; border-radius: 8px; overflow: hidden; border: 2px solid var(--yellow); display: flex; align-items: center; justify-content: center; }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .info-wrapper { display: flex; justify-content: space-between; align-items: flex-start; flex-grow: 1; }
        .company-name { font-size: 0.9rem; color: var(--yellow); text-transform: uppercase; font-weight: bold; }
        
        .status-badge { display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .status-badge.active { background: rgba(46, 204, 113, 0.15); border: 1px solid var(--green); color: var(--green); }
        .status-badge.expired-badge { background: rgba(255, 77, 77, 0.2); border: 2px solid var(--red); color: var(--red); }
        
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot.green { background-color: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1.5s infinite; }
        .dot.red { background-color: var(--red); box-shadow: 0 0 8px var(--red); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .vacancy-title { font-size: 2.2rem; font-weight: 900; margin: 5px 0; line-height: 1.1; }
        .description { color: #d1d1d1; margin: 20px 0; font-size: 1.1rem; line-height: 1.5; }
        
        .action-row { display: flex; gap: 10px; align-items: stretch; margin-top: 20px; }
        .call-btn { flex-grow: 1; text-align: center; padding: 18px; text-decoration: none; font-weight: 900; border-radius: 8px; text-transform: uppercase; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; border: none; }
        .call-btn.active-btn { background: var(--yellow); color: var(--bg); }
        .call-btn.expired-btn { background: var(--red); color: white; cursor: default; }
        
        .share-btn-wrap { background: rgba(255,255,255,0.1); border: 1px solid var(--yellow); padding: 0 15px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .logo-stack { position: relative; width: 45px; height: 24px; pointer-events: none; }
        .mini-logo { width: 22px; height: 22px; position: absolute; background: transparent; }
        .l1 { left: 0; z-index: 3; } .l2 { left: 12px; z-index: 2; } .l3 { left: 24px; z-index: 1; }

        #loader { text-align: center; padding: 50px; font-size: 1.5rem; color: var(--yellow); }
    </style>
</head>
<body>

    <section class="hero">
        <img src="https://github.com/lukamikautadze/KSjob/raw/main/_%E1%83%9A%E1%83%9D%E1%83%92%E1%83%9D-%E1%83%97%E1%83%94%E1%83%97%E1%83%A0%E1%83%98-%E1%83%92%E1%83%90%E1%83%9B%E1%83%AD%E1%83%98%E1%83%A0%E1%83%95%E1%83%90%E1%83%9B%E1%83%AD%E1%83%98%E1%83%A0%E1%83%95%E1%83%90%E1%83%9A%E1%83%94-%E1%83%A1%E1%83%90%E1%83%91%E1%83%AD%E1%83%9D.png" alt="Council Logo" class="hero-logo">

        <h1>საზაფხულო ვაკანსიები <br> ქუთაისში</h1>
        <p>ყველაზე აქტუალური ვაკანსიები ქუთაისში. იპოვე შენი მომავალი სამსახური დღესვე.</p>
        <div class="scroll-indicator">ჩამოშალეთ ვაკანსიებისთვის ↓</div>
    </section>

    <div id="loader">იტვირთება...</div>
    <div class="feed" id="vacancy-feed"></div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8h_VRg9Qzv6U7qB3E4WDM0RXakzamSRIBCOqZT3qtFH-UE0p8QTUrkuGioYOar_KNlIx3dzOXebk8/pub?gid=0&single=true&output=csv'; 

        function handleShare(title, company) {
            const text = `${company}-ში ეძებენ: ${title}. ნახე აქ: ${window.location.href}`;
            if (navigator.share) {
                navigator.share({ title: 'Job', text: text, url: window.location.href }).catch(()=>{});
            } else {
                navigator.clipboard.writeText(text);
                alert('ბმული კოპირებულია');
            }
        }

        async function loadJobs() {
            try {
                const res = await fetch(csvUrl);
                const data = await res.text();
                const rows = data.split(/\r?\n/).filter(r => r.includes(',')).slice(1);
                const feed = document.getElementById('vacancy-feed');
                document.getElementById('loader').style.display = 'none';

                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    if (cols.length >= 6) {
                        let [logo, company, title, desc, phone, status] = cols.map(c => c ? c.replace(/^"|"$/g, '').trim() : "");
                        if (logo.includes("github.com/")) logo = logo.replace("/blob/", "/raw/");
                        
                        const isActive = status && status.toLowerCase() === 'active';
                        const card = document.createElement('div');
                        card.className = `vacancy-card ${!isActive ? 'expired' : ''}`;
                        
                        const badgeHTML = isActive 
                            ? '<div class="status-badge active"><div class="dot green"></div>Active</div>'
                            : '<div class="status-badge expired-badge"><div class="dot red"></div>Expired</div>';

                        const btnClass = isActive ? 'active-btn' : 'expired-btn';
                        const btnText = isActive ? 'დარეკვა: ' + phone : 'ვაკანსია შევსებულია';

                        card.innerHTML = `
                            <div class="card-header">
                                <div class="logo-box">
                                    <img src="${logo}" onerror="this.src='https://via.placeholder.com/100/001a35/FFD700?text=LOGO'">
                                </div>
                                <div style="flex-grow: 1;">
                                    <div class="info-wrapper">
                                        <span class="company-name">${company}</span>
                                        ${badgeHTML}
                                    </div>
                                    <h2 class="vacancy-title">${title}</h2>
                                </div>
                            </div>
                            <p class="description">${desc}</p>
                            <div class="action-row">
                                <a ${isActive ? `href="tel:${phone}"` : 'href="javascript:void(0)"'} class="call-btn ${btnClass}">${btnText}</a>
                                <div class="share-btn-wrap" onclick="handleShare('${title.replace(/'/g, "")}', '${company.replace(/'/g, "")}')">
                                    <div class="logo-stack">
                                        <img class="mini-logo l1" src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
                                        <img class="mini-logo l2" src="https://cdn-icons-png.flaticon.com/512/5968/5968771.png">
                                        <img class="mini-logo l3" src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
                                    </div>
                                </div>
                            </div>
                        `;
                        feed.appendChild(card);
                    }
                });
            } catch (e) {
                document.getElementById('loader').innerText = "შეცდომა მონაცემების ჩატვირთვისას.";
            }
        }
        loadJobs();
    </script>
</body>
</html>
