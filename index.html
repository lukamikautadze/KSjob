<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Jobs</title>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const csvFile = 'path/to/your/csvfile.csv';
            fetch(csvFile)
                .then(response => response.text())
                .then(data => {
                    const csvData = parseCSV(data);
                    displayData(csvData);
                });
        });

        function parseCSV(data) {
            const rows = data.split('\n');
            return rows.map(row => row.split(','));
        }

        function displayData(data) {
            const container = document.getElementById('data-container');
            data.forEach(item => {
                const card = document.createElement('div');
                card.classList.add('card');
                const title = document.createElement('h2');
                title.textContent = item[0]; // Assuming the first column is the title
                card.appendChild(title);
                container.appendChild(card);
            });
        }
    </script>
</head>
<body>
    <header><h1>Summer Jobs</h1></header>
    <div id="data-container"></div>
    <script>
        document.querySelector('#your-button').addEventListener('click', function() {
            // Your button click logic
        });
    </script>
</body>
</html>
