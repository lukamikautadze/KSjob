<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kutaisi Jobs</title>
    <style>
        :root { --bg: #001f3f; --card: #002d5b; --yellow: #FFD700; --text: #ffffff; --green: #2ecc71; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; }
        header { padding: 40px 20px; text-align: center; border-bottom: 5px solid var(--yellow); }
        h1 { font-size: 2.5rem; color: var(--yellow); margin: 0; text-transform: uppercase; }
        
        .feed { max-width: 750px; margin: 30px auto; padding: 0 20px; }
        .vacancy-card { background: var(--card); padding: 25px; margin-bottom: 25px; border-radius: 12px; border: 1px solid rgba(255,215,0,0.1); position: relative; }
        
        /* Expired Style */
        .expired { opacity: 0.6; filter: grayscale(1); }

        .card-header { display: flex; align-items: center; gap: 20px; margin-bottom: 15px; }
        .logo-box { width: 100px; height: 100px; min-width: 100px; background: #001a35; border-radius: 8px; overflow: hidden; border: 2px solid var(--yellow); display: flex; align-items: center; justify-content: center; }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .info-wrapper { flex-grow: 1; display: flex; justify-content: space-between; align-items: flex-start; }
        .company-name { font-size: 0.9rem; color: var(--yellow); text-transform: uppercase; }
        
        /* Status Badge */
        .status-badge { display: flex; align-items: center; gap: 6px; background: rgba(46, 204, 113, 0.15); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--green); }
        .dot { width: 8px; height: 8px; background-color: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); animation: pulse 1.5s infinite; }
        .status-text { color: var(--green); font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .vacancy-title { font-size: 2.2rem; font-weight: 900; margin: 5px 0; line-height: 1.1; }
        .tag { background: rgba(255,215,0,0.15); color: var(--yellow); padding: 4px 10px; font-size: 0.75rem; border: 1px solid var(--yellow); border-radius: 4px; display: inline-block; }
        .description { color: #d1d1d1; margin: 20px 0; font-size: 1.1rem; line-height: 1.5; }
        
        .action-row { display: flex; gap: 10px; }
        .call-btn { flex-grow: 1; background: var(--yellow); color: var(--bg); text-align: center; padding: 18px; text-decoration: none; font-weight: 900; border-radius: 8px; text-transform: uppercase; font-size: 1.2rem; }
        
        .share-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--yellow); color: var(--yellow); padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        #loader { text-align: center; padding: 100px; font-size: 1.5rem; color: var(--yellow); }
    </style>
</head>
<body>
    <header><h1>CITY JOBS</h1></header>
    <div id="loader">იტვირთება...</div>
    <div class="feed" id="vacancy-feed"></div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8h_VRg9Qzv6U7qB3E4WDM0RXakzamSRIBCOqZT3qtFH-UE0p8QTUrkuGioYOar_KNlIx3dzOXebk8/pub?gid=0&single=true&output=csv'; 

        function shareLink() {
            const text = `ნახე ეს ვაკანსია ქუთაისში: ${window.location.href}`;
            if (navigator.share) {
                navigator.share({ title: 'Kutaisi Jobs', text: text, url: window.location.href });
            } else {
                navigator.clipboard.writeText(text);
                alert('ბმული კოპირებულია!');
            }
        }

        async function loadJobs() {
            try {
                const res = await fetch(csvUrl);
                const data = await res.text();
                const rows = data.split(/\r?\n/).filter(r => r.includes(',')).slice(1);
                const feed = document.getElementById('vacancy-feed');
                document.getElementById('loader').style.display = 'none';

                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 6) {
                        let [logo, company, title, desc, tag, phone, status] = cols.map(c => c ? c.replace(/^"|"$/g, '').trim() : "");
                        if (logo.includes("github.com/")) logo = logo.replace("/blob/", "/raw/");
                        const isActive = status && status.toLowerCase() === 'active';

                        const card = document.createElement('div');
                        card.className = `vacancy-card ${!isActive ? 'expired' : ''}`;
                        card.innerHTML = `
                            <div class="card-header">
                                <div class="logo-box">
                                    <img src="${logo}" onerror="this.src='https://via.placeholder.com/100/001a35/FFD700?text=LOGO'">
                                </div>
                                <div style="flex-grow: 1;">
                                    <div class="info-wrapper">
                                        <span class="company-name">${company}</span>
                                        ${isActive ? '<div class="status-badge"><div class="dot"></div><span class="status-text">Active</span></div>' : ''}
                                    </div>
                                    <h2 class="vacancy-title">${title}</h2>
                                    <span class="tag">${tag}</span>
                                </div>
                            </div>
                            <p class="description">${desc}</p>
                            <div class="action-row">
                                <a href="tel:${phone}" class="call-btn">${isActive ? 'დარეკვა: ' + phone : 'დასრულებულია'}</a>
                                <button class="share-btn" onclick="shareLink()">SHARE</button>
                            </div>
                        `;
                        feed.appendChild(card);
                    }
                });
            } catch (e) {
                document.getElementById('loader').innerText = "შეცდომა მონაცემების ჩატვირთვისას.";
            }
        }
        loadJobs();
    </script>
</body>
</html>
