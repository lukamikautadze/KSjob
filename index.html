<style>
    .action-row { 
        display: flex; 
        gap: 12px; 
        align-items: stretch; 
    }
    
    .call-btn { 
        flex-grow: 1; 
        background: var(--yellow); 
        color: var(--bg); 
        text-align: center; 
        padding: 18px; 
        text-decoration: none; 
        font-weight: 900; 
        border-radius: 8px; 
        text-transform: uppercase; 
        font-size: 1.1rem; 
    }

    /* THE STACKED LOGO SHARE BUTTON */
    .stack-share-btn {
        width: 60px;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,215,0,0.3);
        border-radius: 8px;
        cursor: pointer;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        transition: transform 0.2s;
    }
    
    .stack-share-btn:active { transform: scale(0.9); }

    .logo-stack {
        position: relative;
        width: 40px;
        height: 30px;
    }

    .mini-logo {
        width: 18px;
        height: 18px;
        border-radius: 4px;
        position: absolute;
        border: 1px solid var(--card);
        background: white;
    }

    /* Overlapping positions */
    .logo-1 { top: 0; left: 0; z-index: 3; }      /* WhatsApp green */
    .logo-2 { top: 4px; left: 10px; z-index: 2; } /* Messenger blue */
    .logo-3 { top: 8px; left: 20px; z-index: 1; } /* Instagram/Generic */

    /* Tooltip for Desktop */
    .stack-share-btn::after {
        content: "COPIED!";
        position: absolute;
        bottom: -30px;
        background: var(--green);
        color: white;
        font-size: 0.6rem;
        padding: 2px 5px;
        border-radius: 3px;
        opacity: 0;
        transition: opacity 0.3s;
    }
    .stack-share-btn.copied::after { opacity: 1; }
</style>

<script>
    async function handleShare(btn, title, company) {
        const text = `ვაკანსია ქუთაისში: ${company}-ში ეძებენ '${title}'. ნახე აქ: ${window.location.href}`;
        
        if (navigator.share) {
            // Mobile: Opens native WhatsApp/Messenger/etc
            try {
                await navigator.share({ title: 'Kutaisi Jobs', text: text, url: window.location.href });
            } catch (err) {}
        } else {
            // Desktop: Copy to clipboard
            navigator.clipboard.writeText(text);
            btn.classList.add('copied');
            setTimeout(() => btn.classList.remove('copied'), 2000);
        }
    }

    // Inside your rows.forEach loop, replace the button area with this:
    card.innerHTML = `
        ... (rest of your card) ...
        <div class="action-row">
            <a href="tel:${phone}" class="call-btn">${isActive ? 'დარეკვა: ' + phone : 'დასრულებულია'}</a>
            
            <button class="stack-share-btn" onclick="handleShare(this, '${title}', '${company}')">
                <div class="logo-stack">
                    <img class="mini-logo logo-1" src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
                    <img class="mini-logo logo-2" src="https://upload.wikimedia.org/wikipedia/commons/b/be/Facebook_Messenger_logo_2020.svg">
                    <img class="mini-logo logo-3" src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
                </div>
            </button>
        </div>
    `;
</script>
