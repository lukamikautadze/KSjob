<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ადმინ პანელი - ვაკანსიების მართვა</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --bg: #001f3f; 
            --card: #002d5b; 
            --yellow: #FFD700; 
            --text: #ffffff; 
            --green: #2ecc71; 
            --red: #ff4d4d; 
            --main-font: 'Noto Sans Georgian', sans-serif;
        }
        
        * { box-sizing: border-box; }
        body, html, h1, h2, p, span, div, a, button { font-family: var(--main-font) !important; }
        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 0; }

        header {
            background: var(--card);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,215,0,0.1);
        }
        header h1 { color: var(--yellow); margin: 0; font-size: 1.8rem; font-weight: 900; }
        header a { color: #ffffff; text-decoration: none; font-size: 0.9rem; opacity: 0.7; display: inline-block; margin-top: 8px; }
        header a:hover { opacity: 1; color: var(--yellow); }

        .container { max-width: 750px; margin: 40px auto; padding: 0 20px; }

        #loader { text-align: center; padding: 40px; font-size: 1.2rem; color: var(--yellow); }

        .admin-card { 
            background: var(--card); 
            padding: 20px; 
            margin-bottom: 20px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,215,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .job-details { flex-grow: 1; min-width: 0; }
        .job-title { font-size: 1.3rem; font-weight: 700; margin: 0 0 6px 0; color: #fff; }
        .job-company { color: var(--yellow); font-size: 0.85rem; text-transform: uppercase; font-weight: bold; }
        
        .delete-btn {
            background: rgba(255, 77, 77, 0.15);
            color: var(--red);
            border: 1px solid var(--red);
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .delete-btn:hover {
            background: var(--red);
            color: #fff;
        }
        .delete-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: rgba(255,255,255,0.1);
            color: #ccc;
            border-color: #ccc;
        }

        .empty-state { text-align: center; padding: 40px; color: rgba(255,255,255,0.4); }
    </style>
</head>
<body>

    <header>
        <h1>ვაკანსიების მართვის პანელი</h1>
        <a href="index.html">← მთავარ გვერდზე დაბრუნება</a>
    </header>

    <div class="container">
        <div id="loader">იტვირთება მიმდინარე ვაკანსიები...</div>
        <div id="admin-feed"></div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8h_VRg9Qzv6U7qB3E4WDM0RXakzamSRIBCOqZT3qtFH-UE0p8QTUrkuGioYOar_KNlIx3dzOXebk8/pub?gid=0&single=true&output=csv';
        
        // ⚠️ აქ ჩასვი შენი Google Apps Script-ის Web App URL
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbyA-SpIz9cj4Luz5iGKDq_91nDya9ogIPfmXcUybCkBAGZ8LJQ_QCTrLv72A0PkRxPM/exec';

        function parseCSV(text) {
            let lines = []; let row = [""]; let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i]; let next = text[i+1];
                if (c === '"') {
                    if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; } 
                    else { inQuotes = !inQuotes; }
                } else if (c === ',' && !inQuotes) { row.push(""); } 
                else if ((c === '\r' || c === '\n') && !inQuotes) {
                    if (c === '\r' && next === '\n') { i++; }
                    lines.push(row); row = [""];
                } else { row[row.length - 1] += c; }
            }
            if (row.length > 1 || row[0] !== "") lines.push(row);
            return lines;
        }

        async function deleteVacancy(button, company, title) {
            if (!confirm(`ნამდვილად გსურთ წაშალოთ ვაკანსია: "${title}" (${company})?`)) return;
            
            button.disabled = true;
            button.innerText = "იშლება...";

            try {
                const response = await fetch(scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors', // თავიდან აგვაცილებს ბრაუზერის CORS ბლოკირებას
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'delete', company: company, title: title })
                });

                // რადგან no-cors რეჟიმში პასუხს ვერ ვკითხულობთ, ველოდებით 1 წამს და ვშლით ელემენტს ვიზუალურად
                alert("მოთხოვნა გაგზავნილია. ბაზა განახლდება რამდენიმე წამში.");
                button.closest('.admin-card').remove();
                
                // თუ ბარათები აღარ დარჩა
                if (document.getElementById('admin-feed').children.length === 0) {
                    document.getElementById('admin-feed').innerHTML = '<div class="empty-state">ვაკანსიები არ მოიძებნა.</div>';
                }
            } catch (error) {
                alert("შეცდომა კავშირისას. სცადეთ თავიდან.");
                button.disabled = false;
                button.innerText = "წაშლა";
            }
        }

        async function loadAdminJobs() {
            try {
                const res = await fetch(csvUrl + '&t=' + Date.now(), { cache: 'no-store' });
                const data = await res.text();
                const rows = parseCSV(data);
                
                const feed = document.getElementById('admin-feed');
                document.getElementById('loader').style.display = 'none';
                let count = 0;

                for (let i = 1; i < rows.length; i++) {
                    let cols = rows[i];
                    if (cols.length >= 6) {
                        let [logo, company, title, desc, phone, status] = cols.map(c => c ? c.replace(/^"|"$/g, '').trim() : "");
                        if (!company || !title) continue;

                        const card = document.createElement('div');
                        card.className = 'admin-card';
                        
                        // მნიშვნელოვანია ბრჭყალების სწორად გაქცევა ფუნქციაში გადასაცემად
                        const safeCompany = company.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                        const safeTitle = title.replace(/'/g, "\\'").replace(/"/g, '&quot;');

                        card.innerHTML = `
                            <div class="job-details">
                                <div class="job-company">${company}</div>
                                <h2 class="job-title">${title}</h2>
                            </div>
                            <button class="delete-btn" onclick="deleteVacancy(this, '${safeCompany}', '${safeTitle}')">წაშლა</button>
                        `;
                        
                        feed.appendChild(card);
                        count++;
                    }
                }

                if (count === 0) {
                    feed.innerHTML = '<div class="empty-state">ამჟამად აქტიური ვაკანსიები არ არის.</div>';
                }
            } catch (e) {
                document.getElementById('loader').innerText = "შეცდომა მონაცემების ჩატვირთვისას.";
            }
        }

        loadAdminJobs();
    </script>
</body>
</html>
